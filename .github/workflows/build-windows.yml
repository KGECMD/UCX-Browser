name: Build Windows - UCX Browser

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version'
        required: true
        default: '2.0.1'

jobs:
  build-ucx:
    runs-on: windows-latest
    timeout-minutes: 120
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Download Ungoogled Chromium
        run: |
          $version = "149.0.7827.200-1.1"
          $url = "https://github.com/ungoogled-software/ungoogled-chromium-windows/releases/download/$version/ungoogled-chromium_${version}_windows_x64.zip"
          Write-Host "Downloading UCX Browser..."
          curl -L $url -o "ucx.zip" --silent --show-error
          Write-Host "Download complete. Extracting..."
          Expand-Archive -Path "ucx.zip" -DestinationPath "chromium" -Force
          Write-Host "Done!"
      
      - name: Create UCX Identity
        run: |
          # Flatten extracted folder
          $browserDir = Get-ChildItem -Path "chromium" -Directory | Where-Object { $_.Name -like "*ungoogled*" } | Select-Object -First 1
          if ($browserDir) {
            Move-Item -Path "chromium\$($browserDir.Name)\*" -Destination "chromium\" -Force
            Remove-Item -Path "chromium\$($browserDir.Name)" -Recurse -Force
          }
          Write-Host "Browser extracted"
      
      - name: Apply UCX Branding
        run: |
          $version = "2.0.1"
          
          # UCX Product Version
          @"
          UCX Browser $version
          Privacy-First Chromium
          Copyright 2024 UCX Project
          "@ | Out-File -FilePath "chromium\PRODUCT_VERSION" -Encoding ASCII -NoNewline
          
          # UCX Info
          @"
          # UCX Browser v$version - Privacy-First Chromium
          
          ## Privacy Features
          - Maximum telemetry removal
          - WebRTC IP leak protection
          - SearXNG as default search (https://searxng.website)
          - Third-party cookies blocked
          - HTTPS-only mode enforced
          - DNS-over-HTTPS enabled
          - Do Not Track enabled
          
          ## Branding
          - UCX Shield Logo
          - Custom launcher icons
          
          Based on Ungoogled Chromium 149.0.7827.200
          "@ | Out-File -FilePath "chromium\UCX-INFO.txt" -Encoding UTF8
          
          # Copy default preferences
          Copy-Item "resources\default_preferences.json" "chromium\default_preferences.json" -Force
          
          # Copy UCX icons
          Copy-Item "resources\ucx.ico" "chromium\" -Force
          Copy-Item "resources\ucx_*.png" "chromium\" -Force
          Write-Host "UCX branding applied"
      
      - name: Create UCX Launchers
        run: |
          # UCX Browser Launcher
          @'
          @echo off
          title UCX Browser - Privacy-First Chromium
          "%~dp0chrome.exe" --user-data-dir="%~dp0profile" %*
          '@ | Out-File -FilePath "chromium\UCX-Browser.exe" -Encoding ASCII -NoNewline
          
          # UCX Portable Mode
          @'
          @echo off
          title UCX Browser - Portable Mode
          "%~dp0chrome.exe" --user-data-dir="%~dp0profile" --enable-features=IncognitoAvailableWebwide %*
          '@ | Out-File -FilePath "chromium\UCX-Browser-Portable.exe" -Encoding ASCII -NoNewline
          
          Write-Host "Launchers created"
      
      - name: Create Installer
        run: |
          @'
          @echo off
          mode 80,25
          color 1F
          cls
          echo.
          echo  ================================================
          echo   UCX Browser v2.0.1
          echo   Privacy-First Chromium
          echo  ================================================
          echo.
          echo  [1] Desktop
          echo  [2] Start Menu  
          echo  [3] Current Folder
          echo  [Q] Quit
          echo.
          set /p CHOICE="Select install location: "
          
          if "%CHOICE%"=="1" goto desktop
          if "%CHOICE%"=="2" goto startmenu
          if "%CHOICE%"=="3" goto current
          if /i "%CHOICE%"=="Q" exit
          goto end
          
          :desktop
          powershell -Command "Expand-Archive -Path '%~dp0UCX-Browser-Windows-x64.zip' -DestinationPath '%USERPROFILE%\Desktop\UCX-Browser' -Force"
          echo.
          echo  Installed to Desktop!
          set /p RUN="Launch now? (Y/N): "
          if /i "%RUN%"=="Y" start "" "%USERPROFILE%\Desktop\UCX-Browser\UCX-Browser.exe"
          goto end
          
          :startmenu
          powershell -Command "Expand-Archive -Path '%~dp0UCX-Browser-Windows-x64.zip' -DestinationPath '%APPDATA%\Microsoft\Windows\Start Menu\Programs\UCX-Browser' -Force"
          echo.
          echo  Installed to Start Menu!
          set /p RUN="Launch now? (Y/N): "
          if /i "%RUN%"=="Y" start "" "%APPDATA%\Microsoft\Windows\Start Menu\Programs\UCX-Browser\UCX-Browser.exe"
          goto end
          
          :current
          powershell -Command "Expand-Archive -Path '%~dp0UCX-Browser-Windows-x64.zip' -DestinationPath '%CD%\UCX-Browser' -Force"
          echo.
          echo  Installed!
          set /p RUN="Launch now? (Y/N): "
          if /i "%RUN%"=="Y" start "" "%CD%\UCX-Browser\UCX-Browser.exe"
          
          :end
          echo.
          pause
          '@ | Out-File -FilePath "chromium\Setup.bat" -Encoding ASCII -NoNewline
          
          # Create portable README
          @"
          # UCX Browser v2.0.1 - README
          
          ## Quick Start
          1. Run UCX-Browser.exe to start
          2. For portable mode, run UCX-Browser-Portable.exe
          3. Use Setup.bat to install properly
          
          ## Privacy Features
          - Default search: SearXNG (searxng.website)
          - All telemetry removed
          - WebRTC protected
          - HTTPS-only enforced
          
          Based on Ungoogled Chromium 149.0.7827.200
          
          Privacy First. No Compromise.
          "@ | Out-File -FilePath "chromium\README.txt" -Encoding UTF8
          Write-Host "Installer created"
      
      - name: Package
        run: |
          mkdir dist -Force
          Compress-Archive -Path "chromium\*" -DestinationPath "dist\UCX-Browser-v2.0.1-Windows-x64.zip" -Force
          Write-Host "Package created: $([math]::Round((Get-Item 'dist\UCX-Browser-v2.0.1-Windows-x64.zip').Length / 1MB, 2)) MB"
      
      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: UCX-Browser-Windows
          path: dist/*
          retention-days: 30

  release:
    needs: build-ucx
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    
    steps:
      - name: Download
        uses: actions/download-artifact@v4
        with:
          name: UCX-Browser-Windows
          path: artifact
      
      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifact/*
          body: |
            # 🛡️ UCX Browser v2.0.1
            
            **Privacy-First Chromium Browser**
            
            ## 🔒 Privacy Features (Maximum Protection)
            - ✅ **SearXNG as default search** (searxng.website)
            - ✅ All telemetry removed
            - ✅ WebRTC IP leak protection
            - ✅ Third-party cookies blocked
            - ✅ HTTPS-only mode enforced
            - ✅ DNS-over-HTTPS enabled
            - ✅ Do Not Track enabled
            - ✅ Privacy sandbox disabled
            
            ## 📦 Included Files
            - **UCX-Browser.exe** - Main launcher with UCX branding
            - **UCX-Browser-Portable.exe** - Portable mode
            - **Setup.bat** - Interactive installer
            - **README.txt** - Quick start guide
            - **UCX-INFO.txt** - Privacy manifest
            - **ucx.ico** - Custom UCX icon
            - **default_preferences.json** - Privacy settings
            
            ## 🚀 Quick Start
            1. Extract ZIP
            2. Run UCX-Browser.exe
            3. Enjoy private browsing!
            
            ## Based On
            Ungoogled Chromium 149.0.7827.200
            
            *Privacy First. No Compromise.*
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
