name: Build Windows

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag'
        required: true
        default: '1.0.0'

jobs:
  build-windows:
    runs-on: windows-2022
    strategy:
      matrix:
        include:
          - arch: x64
            gn_arch: x64
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          
      - name: Install depot_tools
        run: |
          git clone https://chromium.googlesource.com/chromium/tools/depot_tools.git $env:TEMP\depot_tools
          $env:PATH = "$env:TEMP\depot_tools;$env:PATH"
          [Environment]::SetEnvironmentVariable("PATH", $env:PATH, "Process")
          
      - name: Fetch Chromium
        env:
          PATH: "$env:TEMP\depot_tools;$env:PATH"
        run: |
          mkdir chromium
          cd chromium
          fetch --nohooks chromium
          cd src
          $version = Get-Content ../revision.txt
          git checkout $version
          
      - name: Apply Patches
        run: |
          $env:PATH = "$env:TEMP\depot_tools;$env:PATH"
          cd ..
          python utils/patches.py apply -s src/
          
      - name: Build
        env:
          PATH: "$env:TEMP\depot_tools;$env:PATH"
        run: |
          cd src
          gn gen out/Release --args="is_official_build=true symbol_level=0"
          ninja -C out/Release chrome
          
      - name: Package
        run: |
          mkdir dist
          Compress-Archive -Path src/out/Release/* -DestinationPath dist/UCX-Browser-Windows-x64.zip
          
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: UCX-Browser-Windows-x64
          path: dist/*.zip
          
  release:
    needs: build-windows
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          
      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: artifacts/**/*.zip
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
