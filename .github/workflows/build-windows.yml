name: Build Windows

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag'
        required: true
        default: '1.0.0'

jobs:
  build-windows:
    runs-on: windows-latest
    strategy:
      matrix:
        arch: [x64, x86]
        windows-version: ['2019', '2022']
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          
      - name: Install depot_tools
        run: |
          git clone https://chromium.googlesource.com/chromium/tools/depot_tools.git $env:TEMP\depot_tools
          $env:PATH = "$env:TEMP\depot_tools;$env:PATH"
          [Environment]::SetEnvironmentVariable("PATH", $env:PATH, "Process")
          
      - name: Fetch Chromium
        env:
          PATH: "$env:TEMP\depot_tools;$env:PATH"
        run: |
          mkdir chromium
          cd chromium
          fetch --nohooks chromium
          cd src
          git checkout ${{ github.event.inputs.version || github.ref_name }}
          
      - name: Apply Patches
        run: |
          $env:PATH = "$env:TEMP\depot_tools;$env:PATH"
          python ../ucx-browser/utils/patches.py apply -s src/
          
      - name: Build
        run: |
          $env:PATH = "$env:TEMP\depot_tools;$env:PATH"
          cd src
          gn gen out/Release --args="is_official_build=true symbol_level=0"
          ninja -C out/Release chrome
          
      - name: Package
        run: |
          7z a -tzip UCX-Browser-Win-${{ matrix.arch }}.zip ./src/out/Release/*
          
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: UCX-Browser-Windows-${{ matrix.arch }}
          path: UCX-Browser-Win-${{ matrix.arch }}.zip
          
  release:
    needs: build-windows
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          
      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: artifacts/**/*.zip
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
