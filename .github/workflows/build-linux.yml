name: Build Linux

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-linux-x64:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: read
      
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Download Ungoogled Chromium Linux
        run: |
          VERSION="146.0.7680.153-1.1"
          curl -L "https://github.com/ungoogled-software/ungoogled-chromium-linux-x64/releases/download/${VERSION}/ungoogled-chromium_${VERSION}_linux_x64.tar.xz" -o ucx.tar.xz --silent --show-error
          tar -xf ucx.tar.xz && echo "Extracted successfully"
      
      - name: Apply Branding
        run: |
          cp resources/ucx*.png ucx-chromium/ 2>/dev/null || true
      
      - name: Configure SearXNG
        run: |
          echo '{"default_search_provider":{"name":"SearXNG","search_url":"https://searxng.website/search?q={searchTerms}"},"default_search_provider_data":{"template_url_data":{"keyword":"searxng","name":"SearXNG","search_url":"https://searxng.website/search?q={searchTerms}"}}}' > ucx-chromium/master_preferences
      
      - name: Create Privacy Guide
        run: |
          echo "UCX Browser v1.1.0 - Privacy Guide" > ucx-chromium/PRIVACY-GUIDE.txt
          echo "" >> ucx-chromium/PRIVACY-GUIDE.txt
          echo "Privacy Features:" >> ucx-chromium/PRIVACY-GUIDE.txt
          echo "- No telemetry or tracking" >> ucx-chromium/PRIVACY-GUIDE.txt
          echo "- WebRTC IP protection" >> ucx-chromium/PRIVACY-GUIDE.txt
          echo "- Default search: SearXNG" >> ucx-chromium/PRIVACY-GUIDE.txt
          echo "" >> ucx-chromium/PRIVACY-GUIDE.txt
          echo "Based on: Ungoogled Chromium 146.0.7680.153" >> ucx-chromium/PRIVACY-GUIDE.txt
      
      - name: Package
        run: |
          mkdir -p dist && tar -cJf dist/UCX-Browser-Linux-x64.tar.xz ucx-chromium/
      
      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: UCX-Browser-Linux-x64
          path: dist/*.tar.xz

  release:
    needs: build-linux-x64
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - name: Download
        uses: actions/download-artifact@v4
        with:
          name: UCX-Browser-Linux-x64
          path: artifact
          
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifact/*
          body: "UCX Browser v1.1.0 - Privacy-First Chromium for Linux. Default search: SearXNG"
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
