name: Code Validation

on:
  push:
    branches: [main, master]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  basic-checks:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Validate repository configuration
        run: |
          # Basic config validation
          echo "=== UCX Browser - Basic Configuration Check ==="
          
          # Check for required files
          echo "Checking required files..."
          for file in README.md VERSION.txt downloads.ini patches/series; do
            if [ -f "$file" ]; then
              echo "✓ $file exists"
            else
              echo "✗ $file missing"
              exit 1
            fi
          done
          
          # Count patches
          echo ""
          echo "Patch statistics:"
          echo "  Total patches: $(find patches -name '*.patch' | wc -l)"
          echo "  Series entries: $(wc -l < patches/series)"
          
          echo ""
          echo "=== Build configurations ==="
          echo "Windows workflow: $([ -f .github/workflows/build-windows.yml ] && echo '✓ Present' || echo '✗ Missing')"
          echo "Linux workflow: $([ -f .github/workflows/build-linux.yml ] && echo '✓ Present' || echo '✗ Missing')"
          echo "macOS workflow: $([ -f .github/workflows/build-macos.yml ] && echo '✓ Present' || echo '✗ Missing')"
          
          echo ""
          echo "=== Branding files ==="
          echo "Logo: $([ -f resources/ucx_browser_logo.svg ] && echo '✓ Present' || echo '✗ Missing')"
          echo "Icon: $([ -f resources/ucx_icon.ico ] && echo '✓ Present' || echo '✗ Missing')"
          
          echo ""
          echo "=== UCX Browser v1.0.0 Ready for builds ==="
