<?xml version="1.0" encoding="UTF-8"?>
<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="shieldGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4F46E5"/>
      <stop offset="50%" style="stop-color:#7C3AED"/>
      <stop offset="100%" style="stop-color:#2563EB"/>
    </linearGradient>
    <linearGradient id="innerGlow" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#818CF8"/>
      <stop offset="100%" style="stop-color:#4F46E5"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background circle with gradient -->
  <circle cx="256" cy="256" r="240" fill="url(#shieldGradient)" opacity="0.1"/>
  
  <!-- Shield shape -->
  <path d="M256 50 L400 100 L400 250 C400 350 340 420 256 470 C172 420 112 350 112 250 L112 100 L256 50Z" 
        fill="url(#shieldGradient)" 
        stroke="#818CF8" 
        stroke-width="4"
        filter="url(#glow)"/>
  
  <!-- Inner shield highlight -->
  <path d="M256 70 L385 115 L385 248 C385 335 332 395 256 440 C180 395 127 335 127 248 L127 115 L256 70Z" 
        fill="url(#innerGlow)" 
        opacity="0.3"/>
  
  <!-- UCX Text -->
  <text x="256" y="285" 
        font-family="'Segoe UI', Arial, sans-serif" 
        font-size="110" 
        font-weight="bold" 
        fill="white" 
        text-anchor="middle"
        filter="url(#glow)">UCX</text>
  
  <!-- Shield accent lines -->
  <path d="M200 340 L256 370 L312 340" 
        stroke="white" 
        stroke-width="6" 
        stroke-linecap="round" 
        stroke-linejoin="round"
        opacity="0.9"/>
  
  <!-- Privacy dots -->
  <circle cx="180" cy="160" r="6" fill="white" opacity="0.8"/>
  <circle cx="200" cy="145" r="4" fill="white" opacity="0.6"/>
  <circle cx="312" cy="145" r="4" fill="white" opacity="0.6"/>
  <circle cx="332" cy="160" r="6" fill="white" opacity="0.8"/>
</svg>
