<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="shield" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00D4FF;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0066FF;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="eye" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFFFFF;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#E0E0E0;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Shield Background -->
  <path d="M256 32 L480 128 L480 256 C480 384 384 480 256 512 C128 480 32 384 32 256 L32 128 Z" fill="url(#shield)" stroke="#0044AA" stroke-width="4"/>
  
  <!-- Inner Shield -->
  <path d="M256 56 L456 136 L456 256 C456 368 368 456 256 484 C144 456 56 368 56 256 L56 136 Z" fill="none" stroke="#FFFFFF" stroke-width="3" opacity="0.3"/>
  
  <!-- Privacy Eye -->
  <ellipse cx="256" cy="220" rx="120" ry="80" fill="url(#eye)"/>
  
  <!-- Pupil -->
  <circle cx="256" cy="220" r="40" fill="#001133"/>
  
  <!-- Eye Highlight -->
  <circle cx="280" cy="200" r="15" fill="#FFFFFF" opacity="0.8"/>
  
  <!-- U CX Text -->
  <text x="256" y="380" font-family="Arial, sans-serif" font-size="72" font-weight="bold" fill="#FFFFFF" text-anchor="middle">UCX</text>
  
  <!-- Lock Icon -->
  <rect x="236" y="400" width="40" height="35" rx="5" fill="#00FF88" stroke="#FFFFFF" stroke-width="2"/>
  <path d="M246 400 L246 390 A10 10 0 0 1 266 390 L266 400" fill="none" stroke="#00FF88" stroke-width="5"/>
  <circle cx="256" cy="418" r="5" fill="#FFFFFF"/>
</svg>
